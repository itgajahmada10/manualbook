<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Portal — Waruna Group</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #4e2b5c; --primary-hover: #3b1e47; --bg-card: #ffffff; --border-color: #e8dee8; --text-main: #333333; --success: #27ae60; --error: #c0392b; --warning: #d4ac0d; }
        body { margin: 0; padding: 30px; background: linear-gradient(135deg, #fffdf2 0%, #ffe9d6 100%); color: var(--text-main); font-family: 'Inter', sans-serif; min-height: 100vh; }
        .main-container { display: flex; gap: 25px; flex-wrap: wrap; justify-content: center; max-width: 1500px; margin: 0 auto; align-items: flex-start; }
        .left-panel { flex: 1; min-width: 320px; max-width: 380px; position: sticky; top: 30px; }
        .card-box { background-color: var(--bg-card); padding: 30px; border-radius: 16px; box-shadow: 0 12px 40px rgba(78, 43, 92, 0.08); border: 1px solid var(--border-color); }
        .header { text-align: center; margin-bottom: 25px; }
        .header h2 { color: var(--primary); margin: 0 0 8px 0; font-family: 'Poppins', sans-serif; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 24px;}
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 11px; text-transform: uppercase; font-family: 'Poppins', sans-serif; letter-spacing: 0.5px;}
        select, input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 13px; margin-bottom: 15px; background: #fafafa; box-sizing: border-box;}
        .upload-section { padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px dashed #b59ebc; background: #fbf9fc;}
        input[type="file"] { width: 100%; padding: 8px; background-color: #fff; border-radius: 6px; border: 1px solid #ccc; font-size: 11px; box-sizing: border-box;}
        button.btn-submit { background-color: var(--primary); color: white; border: none; padding: 15px; width: 100%; font-size: 14px; font-family: 'Poppins', sans-serif; font-weight: 600; border-radius: 8px; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .loader { border: 3px solid rgba(78, 43, 92, 0.3); border-top: 3px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 15px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .right-panel { flex: 3; min-width: 850px; width: 100%; }
        .table-responsive { width: 100%; overflow-x: auto; border-radius: 8px; border: 1px solid var(--border-color); background: #fff;}
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background-color: #fbf9fc; padding: 16px 14px; text-align: left; font-weight: 600; color: var(--primary); border-bottom: 2px solid var(--border-color); font-family: 'Poppins', sans-serif; font-size: 11px; text-transform: uppercase;}
        td { padding: 16px 14px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
        .subsystem-header { background-color: #4e2b5c !important; color: white !important; font-family: 'Poppins', sans-serif;}
        .badge-mandatory { font-size: 9px; background: var(--primary); color: white; padding: 3px 6px; border-radius: 4px; font-weight: 700; display: inline-block; margin-bottom: 8px;}
        .trace-box { background: #fbf9fc; border: 1px dashed #d2c5d6; border-radius: 8px; padding: 10px; margin-top: 10px; font-size: 11px; line-height: 1.5;}
        .ai-box { background: #f8f9f9; border: 1px solid #eaeded; border-radius: 8px; padding: 10px; margin-top: 10px; font-size: 11px; }
        .num-val { font-size: 14px; font-weight: 800; font-family: 'Poppins', sans-serif; color: var(--text-main);}
        .tag-info { font-size: 9px; padding: 2px 5px; border-radius: 4px; font-weight: 700; margin-left: 4px; vertical-align: middle;}
        .tag-std { background: #fdedec; color: #d35400; }
        .v-checkbox { width: 20px; height: 20px; cursor: pointer; accent-color: var(--primary); }
        #printHeader { display: none; text-align: center; margin-bottom: 20px; border-bottom: 3px solid var(--primary); padding-bottom: 15px; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="left-panel">
            <div class="card-box">
                <div class="header"><h2><i data-lucide="shield-check"></i> Verification</h2><p>AI Engine</p></div>
                <form id="auditForm">
                    <label>1. Engine Category</label>
                    <select id="engineType"><option value="ME">Main Engine (ME)</option><option value="AE">Aux Engine (AE)</option></select>
                    <div class="upload-section"><label>2. Running Hours Report</label><input type="file" id="rhFile" accept=".pdf, .xlsx, .xls"></div>
                    <div class="upload-section"><label>3. Requisition / PO PDF</label><input type="file" id="reqFile" accept=".pdf" required></div>
                    <button type="submit" id="submitBtn" class="btn-submit"><i data-lucide="zap"></i> RUN AI VERIFICATION</button>
                    <div id="errorBox" style="margin-top:15px; display:none;"></div>
                </form>
            </div>
        </div>
        <div class="right-panel">
            <div id="pollingCard" class="card-box" style="display: none; text-align: center;"><div class="loader"></div><h2>Analyzing...</h2></div>
            <div id="reportPanel" class="card-box" style="display: none;">
                <div id="printableArea">
                    <div id="printHeader">
                        <h2 id="printTitle" style="color: #4e2b5c;">Verification Results</h2>
                        <div id="printSubtitle" style="font-weight: bold; margin-bottom: 5px;"></div>
                        <div style="background: #4e2b5c; color: white; display: inline-block; padding: 4px 15px; border-radius: 20px; font-size: 10px; font-weight: 800;">GENERATED BY AI WARUNA</div>
                    </div>
                    <div id="webHeader" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e8dee8; padding-bottom: 15px; margin-bottom: 15px;">
                        <div><h3 id="reportTitle" style="margin:0;"><i data-lucide="anchor"></i> Results</h3><div id="reportSubtitle" style="font-size:11px; color:#666;"></div></div>
                        <button onclick="downloadPDF()" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:6px; cursor:pointer;"><i data-lucide="printer"></i> Print A4 Portrait</button>
                    </div>
                    <div class="table-responsive" id="tableContainer">
                        <table id="auditTable"><thead><tr><th>No</th><th style="width:35%;">Identity & Traceability</th><th>Inventory</th><th>Limit</th><th>Target</th><th>Decision</th><th>Verify</th></tr></thead><tbody id="tableBody"></tbody></table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        lucide.createIcons();
        const WEBHOOK_URL = "https://n8.waruna-group.co.id/webhook/277b56f1-5761-412a-9be5-86298d5aa5de";
        const STATUS_URL = "https://n8.waruna-group.co.id/webhook/check-audit-status";
        let pollingInterval;

        function renderTable(auditData) {
            document.getElementById('pollingCard').style.display = 'none';
            document.getElementById('reportPanel').style.display = 'block';
            const body = document.getElementById('tableBody');
            body.innerHTML = '';
            document.getElementById('reportSubtitle').innerText = `Date: ${auditData[0].Tanggal || '-'}`;
            
            let grouped = {};
            auditData.forEach(item => {
                let s = item.Subsystem || "GENERAL";
                if (!grouped[s]) grouped[s] = [];
                grouped[s].push(item);
            });

            for (let sub in grouped) {
                let trHead = document.createElement('tr');
                trHead.className = 'subsystem-header';
                trHead.innerHTML = `<td colspan="7">SYSTEM: ${sub}</td>`;
                body.appendChild(trHead);

                grouped[sub].forEach(item => {
                    let tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${item.No_Item_PDF || '-'}</td>
                        <td>
                            <span class="badge-mandatory">MANDATORY</span>
                            <div style="font-weight:bold;">${item.Nama_Barang}</div>
                            <div class="trace-box">
                                <b>DB:</b> ${item.Nama_Master}<br>
                                <b>RH:</b> ${item.Nama_RH || '[NOT FOUND]'}
                            </div>
                        </td>
                        <td><b>Req:</b> ${item.Qty_Diminta}<br><b>ROB:</b> ${item.ROB}</td>
                        <td>${item.Max_Limit_Jam || '-'}</td>
                        <td><div style="font-size:10px;">${item.RH_Terakhir}</div></td>
                        <td><div class="ai-box">${item.Rekomendasi_AI}</div></td>
                        <td><input type="checkbox" class="v-checkbox" checked></td>
                    `;
                    body.appendChild(tr);
                });
            }
            lucide.createIcons();
        }

        async function downloadPDF() {
            const el = document.getElementById('printableArea');
            document.getElementById('webHeader').style.display = 'none';
            document.getElementById('printHeader').style.display = 'block';
            document.getElementById('printSubtitle').innerText = document.getElementById('reportSubtitle').innerText;

            const opt = {
                margin: [0.5, 0.3, 0.5, 0.3],
                filename: 'Verification_Report.pdf',
                html2canvas: { scale: 2, useCORS: true, logging: false },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
            };

            await html2pdf().set(opt).from(el).save();
            document.getElementById('webHeader').style.display = 'flex';
            document.getElementById('printHeader').style.display = 'none';
        }

        async function checkStatus(jobId) {
            try {
                let res = await fetch(`${STATUS_URL}?job_id=${jobId}`);
                let json = await res.json();
                if (json.status === "completed" || Array.isArray(json)) {
                    clearInterval(pollingInterval);
                    renderTable(Array.isArray(json) ? json : json.data);
                }
            } catch (e) {}
        }

        document.getElementById('auditForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = `JOB-${Date.now()}`;
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            const fd = new FormData();
            fd.append('engine_type', document.getElementById('engineType').value);
            fd.append('job_id', id);
            if (document.getElementById('rhFile').files[0]) fd.append('RH_Report', document.getElementById('rhFile').files[0]);
            fd.append('Requisition_Report', document.getElementById('reqFile').files[0]);

            await fetch(WEBHOOK_URL, { method: 'POST', body: fd });
            document.getElementById('pollingCard').style.display = 'block';
            pollingInterval = setInterval(() => checkStatus(id), 3000);
        };
    </script>
</body>
</html>
