<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* ... CSS sebelumnya ... */

        /* STRUKTUR SPLIT VIEW BARU */
        .workspace-container {
            display: flex;
            gap: 20px;
            width: 100%;
        }
        
        .table-panel {
            flex: 1; /* Mengambil ruang tersisa */
            overflow-x: auto;
        }

        .pdf-viewer-panel {
            width: 450px; /* Lebar tetap untuk panel PDF */
            background: #fff;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: -5px 0 15px rgba(0,0,0,0.05);
            /* Menempel saat di-scroll */
            position: sticky;
            top: 30px;
            height: 85vh; 
        }

        .pdf-header {
            padding: 15px;
            background: #fbf9fc;
            border-bottom: 1px solid var(--border-color);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            color: var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pdf-frame {
            flex: 1;
            width: 100%;
            border: none;
            background: #f4f4f4;
        }
        
        /* Highlight baris yang sedang dipilih */
        .row-active {
            background-color: #f0ebf2 !important;
            border-left: 4px solid var(--primary);
        }

        .clickable-row {
            cursor: pointer;
            transition: background 0.2s;
        }
        .clickable-row:hover {
            background-color: #fbf9fc;
        }
        /* ... */
    </style>
</head>
<body>
    <div class="right-panel">
        <div id="reportPanel" class="card-box" style="display: none; padding: 20px; width: 100%;">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-bottom: 15px;">
                <h3 id="reportTitle" style="margin: 0; color: var(--primary); font-family:'Poppins', sans-serif; display: flex; align-items: center; gap:8px;">
                    <i data-lucide="ship"></i> Hasil Audit
                </h3>
                <button id="btnDownload" type="button" onclick="downloadPDF()" style="...">
                    <i data-lucide="file-down" style="width: 16px;"></i> Download PDF
                </button>
            </div>

            <div class="workspace-container">
                
                <div class="table-panel">
                    <table id="auditTable">
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>

                <div id="pdfWorkspace" class="pdf-viewer-panel" style="display: none;">
                    <div class="pdf-header">
                        <span><i data-lucide="book-open" style="width: 18px; margin-right:5px; vertical-align:-3px;"></i> Manual Book Reference</span>
                        <span id="pdfStatusBadge" style="font-size: 10px; background: #e9f7ef; color: #1e8449; padding: 3px 6px; border-radius: 4px;">Ready</span>
                    </div>
                    <iframe id="pdfIframe" class="pdf-frame" src="" title="Manual Book Viewer"></iframe>
                    <div id="pdfPlaceholder" style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; color:#999; padding:20px; text-align:center;">
                        <i data-lucide="file-search" style="width: 40px; height: 40px; margin-bottom:10px; opacity: 0.5;"></i>
                        <p style="font-size: 12px;">Klik pada baris PN di tabel untuk memuat halaman manual book secara otomatis.</p>
                    </div>
                </div>

            </div> </div>
    </div>

    <script>
        // ... (Kode checkJobStatus dan form submit tetap sama) ...

        // FUNGSI RENDER TABEL YANG DIPERBARUI
        function renderTable(auditData) {
            const reportPanel = document.getElementById('reportPanel');
            const tableBody = document.getElementById('tableBody');
            const pdfWorkspace = document.getElementById('pdfWorkspace'); // Tampilkan panel PDF
            
            document.getElementById('pollingCard').style.display = 'none';
            reportPanel.style.display = 'block';
            pdfWorkspace.style.display = 'flex'; // Aktifkan Layout Kanan
            tableBody.innerHTML = '';
            
            // ... (Logika grouping Subsystem tetap sama) ...

            for (let sub in groupedData) {
                // ... (Pembuatan baris Subsystem header tetap sama) ...

                groupedData[sub].forEach((item, index) => {
                    // ... (Pembuatan badge status dan info Master Data tetap sama) ...

                    // Ekstrak URL PDF dari N8N
                    let urlManualBook = item.Link_Manual_Book || "";
                    let targetHal = item.Page_No && item.Page_No !== "-" ? item.Page_No : "Auto-Search";
                    
                    let tr = document.createElement('tr');
                    // Tambahkan class clickable-row
                    tr.className = 'clickable-row'; 
                    // Tambahkan ID unik untuk baris
                    tr.id = `row-${sub.replace(/\s+/g, '-')}-${index}`;
                    
                    tr.innerHTML = `
                        <td style="color:#999;">#${item.No_Item_PDF || "-"}</td>
                        <td>
                            <div style="font-weight:600; color:var(--primary);">${item.Nama_Barang}</div>
                            <div style="margin-top: 2px; margin-bottom: 3px; font-weight: 700; color: #2980b9; font-size: 11px;">
                                PN: ${item.No_Part} 
                                ${targetHal !== "Auto-Search" ? `<span style="background:#ebf5fb; padding:2px 4px; border-radius:4px; margin-left:4px;">Hal. ${targetHal}</span>` : ''}
                            </div>
                            </td>
                        `;

                    // EVENT LISTENER KETIKA BARIS DI KLIK
                    tr.addEventListener('click', function(e) {
                        // Abaikan jika yang diklik adalah checkbox verifikasi
                        if(e.target.type === 'checkbox') return;

                        // Hapus highlight dari baris lain
                        document.querySelectorAll('.row-active').forEach(row => row.classList.remove('row-active'));
                        
                        // Tambahkan highlight ke baris ini
                        this.classList.add('row-active');

                        // MENGUBAH PDF DI PANEL KANAN
                        if(urlManualBook && urlManualBook !== "#") {
                            document.getElementById('pdfPlaceholder').style.display = 'none';
                            const iframe = document.getElementById('pdfIframe');
                            iframe.style.display = 'block';
                            iframe.src = urlManualBook;
                            
                            document.getElementById('pdfStatusBadge').innerText = `Hal: ${targetHal}`;
                        }
                    });

                    tableBody.appendChild(tr);
                });
            }
            lucide.createIcons();
        }
    </script>
</body>
</html>
