<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Logistics Portal — Waruna Group</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --primary: #4e2b5c; --primary-hover: #3b1e47; --bg-card: #ffffff;
            --border-color: #e8dee8; --text-main: #333333; --text-muted: #666666;
            --success: #27ae60; --error: #c0392b; --warning: #d4ac0d; --info: #2980b9;
        }
        body { margin: 0; padding: 30px; background: linear-gradient(135deg, #fffdf2 0%, #ffe9d6 100%); color: var(--text-main); font-family: 'Inter', sans-serif; min-height: 100vh; }
        .main-container { display: flex; gap: 25px; flex-wrap: wrap; justify-content: center; max-width: 1500px; margin: 0 auto; align-items: flex-start; }
        
        /* LEFT PANEL (INPUT) */
        .left-panel { flex: 1; min-width: 320px; max-width: 380px; position: sticky; top: 30px; }
        .card-box { background-color: var(--bg-card); padding: 30px; border-radius: 16px; box-shadow: 0 12px 40px rgba(78, 43, 92, 0.08); border: 1px solid var(--border-color); }
        .header { text-align: center; margin-bottom: 25px; }
        .header h2 { color: var(--primary); margin: 0 0 8px 0; font-family: 'Poppins', sans-serif; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 24px;}
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 11px; text-transform: uppercase; font-family: 'Poppins', sans-serif; letter-spacing: 0.5px;}
        select, input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 13px; margin-bottom: 15px; background: #fafafa; box-sizing: border-box; font-family: 'Inter', sans-serif;}
        .upload-section { padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px dashed #b59ebc; background: #fbf9fc;}
        input[type="file"] { width: 100%; padding: 8px; background-color: #fff; border-radius: 6px; border: 1px solid #ccc; font-size: 11px; box-sizing: border-box;}
        button.btn-submit { background-color: var(--primary); color: white; border: none; padding: 15px; width: 100%; font-size: 14px; font-family: 'Poppins', sans-serif; font-weight: 600; border-radius: 8px; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        button.btn-submit:disabled { background-color: #a395a8; cursor: not-allowed; }

        /* LOADER */
        .loader { border: 3px solid rgba(78, 43, 92, 0.3); border-top: 3px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 15px auto; }
        .loader-small { border: 2px solid rgba(255,255,255,0.3); border-top: 2px solid white; border-radius: 50%; width: 14px; height: 14px; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* RIGHT PANEL (RESULTS) */
        .right-panel { flex: 3; min-width: 850px; width: 100%; }
        .table-responsive { width: 100%; overflow-x: auto; border-radius: 8px; border: 1px solid var(--border-color); background: #fff;}
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background-color: #fbf9fc; padding: 16px 14px; text-align: left; font-weight: 600; color: var(--primary); border-bottom: 2px solid var(--border-color); font-family: 'Poppins', sans-serif; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;}
        td { padding: 16px 14px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
        
        .subsystem-header { background-color: #4e2b5c !important; color: white !important; font-family: 'Poppins', sans-serif; letter-spacing: 0.5px;}
        .subsystem-header td { padding: 12px 15px !important; font-size: 12px; font-weight: 600;}
        
        .row-hover:hover { background-color: #fcfbfd; }

        /* BADGES */
        .badge { padding: 4px 10px; border-radius: 6px; font-weight: 700; font-size: 10.5px; display: inline-flex; align-items: center; gap: 4px;}
        .badge-approved { background-color: #e9f7ef; color: #1e8449; border: 1px solid #a3e4d7; }
        .badge-reduced { background-color: #fdedec; color: #c0392b; border: 1px solid #fadbd8; }
        .badge-warning { background-color: #fcf3cf; color: #d4ac0d; border: 1px solid #f9e79f; }
        .badge-mandatory { font-size: 9px; background: var(--primary); color: white; padding: 3px 6px; border-radius: 4px; font-weight: 700; display: inline-block; margin-bottom: 8px; letter-spacing: 0.5px;}

        /* TRACEABILITY BOX */
        .trace-box { background: #fbf9fc; border: 1px dashed #d2c5d6; border-radius: 8px; padding: 12px; margin-top: 10px; font-size: 11px; line-height: 1.5; position: relative;}
        .trace-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
        .trace-row:last-child { margin-bottom: 0; }
        .trace-icon { color: var(--primary); margin-top: 2px;}
        .trace-label { font-weight: 700; color: var(--primary); min-width: 65px; display: inline-block;}
        .trace-value { font-weight: 600; color: #444; }
        
        /* AI LOGIC ANALYSIS */
        .ai-box { background: #f8f9f9; border: 1px solid #eaeded; border-radius: 8px; padding: 12px; margin-top: 10px; font-size: 11px; }
        .ai-step { color: #666; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; font-weight: 500;}
        .ai-decision { padding: 8px 10px; border-radius: 6px; font-weight: 700; display: flex; align-items: center; gap: 6px; margin-top: 8px; font-size: 11px; text-transform: uppercase;}
        .ai-decision.safe { background: #ebf5fb; color: #2980b9; border: 1px solid #d6eaf8;}
        .ai-decision.cut { background: #fdedec; color: #c0392b; border: 1px solid #fadbd8; }

        /* DATA HIGHLIGHTS */
        .num-val { font-size: 14px; font-weight: 800; font-family: 'Poppins', sans-serif; color: var(--text-main);}
        .tag-info { font-size: 9px; padding: 2px 5px; border-radius: 4px; font-weight: 700; margin-left: 4px; vertical-align: middle;}
        .tag-rh { background: #ebf5fb; color: #2980b9; }
        .tag-std { background: #fdedec; color: #d35400; }
        .cyl-highlight { color: #c0392b; font-weight: 700; background: #fdedec; padding: 4px 8px; border-radius: 4px; display: inline-block; font-size: 11px;}

        .v-checkbox { width: 20px; height: 20px; cursor: pointer; accent-color: var(--primary); }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="left-panel">
            <div class="card-box">
                <div class="header">
                    <h2><i data-lucide="shield-check" style="width:28px; height:28px;"></i> Verification</h2>
                    <p style="color: #666; font-size: 12px; font-weight:500;">Spare Part Logic Engine</p>
                </div>
                <form id="auditForm">
                    <label>1. Engine Category (System)</label>
                    <select id="engineType">
                        <option value="ME">Main Engine (ME)</option>
                        <option value="AE">Aux Engine (AE)</option>
                    </select>
                    
                    <div class="upload-section">
                        <label><i data-lucide="clock" style="width:13px; margin-right:4px;"></i> 2. Running Hours Report</label>
                        <input type="file" id="rhFile" accept=".pdf, .xlsx, .xls">
                    </div>
                    
                    <div class="upload-section">
                        <label><i data-lucide="file-text" style="width:13px; margin-right:4px;"></i> 3. Requisition / PO PDF</label>
                        <input type="file" id="reqFile" accept=".pdf" required>
                    </div>
                    
                    <button type="submit" id="submitBtn" class="btn-submit">
                        <i data-lucide="zap"></i> RUN AI VERIFICATION
                    </button>
                    <div id="errorBox" style="margin-top:15px; color:#c0392b; font-size:12px; display:none; font-weight:bold; background:#fdedec; padding:12px; border-radius:8px; border:1px solid #fadbd8;"></div>
                </form>
            </div>
        </div>

        <div class="right-panel">
            <div id="pollingCard" class="card-box" style="display: none; text-align: center; padding: 80px 20px;">
                <div class="loader"></div>
                <h2 style="color: var(--primary); font-family:'Poppins', sans-serif;">AI is Analyzing Documents...</h2>
                <p id="timerText" style="color: #666; font-size: 13px; font-weight: 500; margin-top: 15px;">Performing Triangulation: Requisition ⇄ Master ⇄ Running Hours</p>
            </div>

            <div id="reportPanel" class="card-box" style="display: none; padding: 25px; width: 100%; box-sizing: border-box;">
                <div id="printableArea">
                    
                    <div id="printHeader" style="display: none; text-align: center; margin-bottom: 25px; border-bottom: 3px solid var(--primary); padding-bottom: 15px;">
                        <h2 id="printTitle" style="margin: 0 0 5px 0; color: var(--primary); font-family:'Poppins', sans-serif; font-size: 22px;">
                            Verification Results
                        </h2>
                        <div id="printSubtitle" style="color: #444; font-size: 12px; font-weight: 600; margin-bottom: 8px;"></div>
                        <div style="background: var(--primary); color: white; display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 1px;">
                            GENERATED BY AI WARUNA
                        </div>
                    </div>

                    <div id="webHeader" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-color); padding-bottom: 20px; margin-bottom: 20px;">
                        <div>
                            <h3 id="reportTitle" style="margin: 0 0 5px 0; color: var(--primary); font-family:'Poppins', sans-serif; display: flex; align-items: center; gap:8px; font-size: 20px;">
                                <i data-lucide="anchor"></i> Verification Results
                            </h3>
                            <div id="reportSubtitle" style="color: #666; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;"></div>
                        </div>
                        <button id="btnDownload" type="button" onclick="downloadPDF()" style="background: var(--primary); color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 8px;">
                            <i data-lucide="printer" style="width: 16px;"></i> Print A4 Portrait
                        </button>
                    </div>

                    <div class="table-responsive" id="tableContainer">
                        <table id="auditTable">
                            <thead>
                                <tr>
                                    <th style="width: 30px; text-align:center;">No</th>
                                    <th style="width: 32%;">Item Identity & Traceability</th>
                                    <th>Inventory</th>
                                    <th>Hours Limit</th>
                                    <th>Target RH Over</th>
                                    <th style="width: 28%;">AI Decision Logic</th>
                                    <th style="text-align: center;">Verify</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const N8N_UPLOAD_URL = "https://n8.waruna-group.co.id/webhook/277b56f1-5761-412a-9be5-86298d5aa5de";
        const N8N_CHECK_STATUS_URL = "https://n8.waruna-group.co.id/webhook/check-audit-status"; 

        let pollingInterval;
        let previousRowCount = 0; 
        let stableCount = 0;      

        function renderTable(auditData) {
            const reportPanel = document.getElementById('reportPanel');
            const tableBody = document.getElementById('tableBody');
            
            document.getElementById('pollingCard').style.display = 'none';
            reportPanel.style.display = 'block';
            tableBody.innerHTML = '';
            
            let vessel = auditData[0].Nama_Kapal || "Unknown Vessel";
            let engine = auditData[0].Tipe_Mesin || "ME";
            let date = auditData[0].Tanggal || "-";
            document.getElementById('reportTitle').innerHTML = `<i data-lucide="anchor"></i> ${vessel} — ${engine}`;
            document.getElementById('reportSubtitle').innerHTML = `Request Date: ${date}`;
            
            let groupedData = {};
            auditData.forEach(item => {
                let sub = item.Subsystem && item.Subsystem !== "-" ? item.Subsystem : "GENERAL COMPONENTS";
                if (!groupedData[sub]) groupedData[sub] = [];
                groupedData[sub].push(item);
            });

            for (let sub in groupedData) {
                let subTr = document.createElement('tr');
                subTr.className = 'subsystem-header';
                subTr.innerHTML = `<td colspan="7"><i data-lucide="layers" style="width:13px; margin-right:6px; vertical-align:-2px;"></i> SYSTEM: ${sub}</td>`;
                tableBody.appendChild(subTr);

                groupedData[sub].forEach((item) => {
                    let aiStatus = item.AI_Status || "";
                    let isChecked = (aiStatus === "APPROVED" || aiStatus === "APPROVED (RESTOCK)") ? "checked" : "";
                    
                    let statusClass = aiStatus.includes("REDUCED") ? "badge-reduced" : (aiStatus === "UNDER-ORDER" ? "badge-warning" : "badge-approved");
                    let statusIcon = aiStatus.includes("REDUCED") ? "alert-circle" : (aiStatus === "UNDER-ORDER" ? "help-circle" : "check-circle");

                    let traceHtml = `
                        <div class="trace-box">
                            <div class="trace-row">
                                <i data-lucide="database" class="trace-icon" style="width:11px; height:11px;"></i>
                                <div><span class="trace-label">Master DB:</span> <span class="trace-value">${item.Nama_Master}</span></div>
                            </div>
                            <div class="trace-row">
                                <i data-lucide="activity" class="trace-icon" style="width:11px; height:11px; color:#d35400;"></i>
                                <div><span class="trace-label" style="color:#d35400;">RH Report:</span> <span class="trace-value">${item.Nama_RH && item.Nama_RH !== "-" ? item.Nama_RH : '<span style="color:#e74c3c;">[NOT FOUND]</span>'}</span></div>
                            </div>
                            <div style="font-size:9px; color:#999; margin-top:8px; border-top:1px solid #e8dee8; padding-top:5px; font-style:italic;">
                                Matched via: ${item.Tipe_Match}
                            </div>
                        </div>`;

                    let aiBoxHtml = "";
                    if (item.Rekomendasi_AI) {
                        let steps = item.Rekomendasi_AI.split("|").map(s => s.trim());
                        aiBoxHtml = `<div class="ai-box">`;
                        steps.forEach(step => {
                            if(step.includes("AI Approved")) {
                                let decisionClass = aiStatus.includes("REDUCED") ? "cut" : "safe";
                                let decisionIcon = aiStatus.includes("REDUCED") ? "scissors" : "check-square";
                                aiBoxHtml += `<div class="ai-decision ${decisionClass}"><i data-lucide="${decisionIcon}" style="width:13px; height:13px;"></i> ${step.replace("AI Approved:", "FINAL DECISION:")}</div>`;
                            } else {
                                aiBoxHtml += `<div class="ai-step"><i data-lucide="chevron-right" style="width:12px; height:12px; color:#ccc;"></i> ${step}</div>`;
                            }
                        });
                        aiBoxHtml += `</div>`;
                    }

                    let rawLimit = item.Max_Limit_Jam || "";
                    let isLimitRh = rawLimit.includes("Data RH") || rawLimit.includes("Master DB");
                    let limitNum = rawLimit.replace(/<[^>]*>?/gm, '').replace(/\D/g,'');
                    let limitBadge = limitNum ? 
                        `<div class="num-val" style="color:${isLimitRh ? '#d35400' : '#2980b9'}">${limitNum} <span class="tag-info ${isLimitRh ? 'tag-std' : 'tag-rh'}">${isLimitRh ? 'Master DB' : 'Ship Data'}</span></div>` : "-";

                    let tr = document.createElement('tr');
                    tr.className = 'row-hover'; 
                    tr.innerHTML = `
                        <td style="color:#999; text-align:center; font-weight:600;">${item.No_Item_PDF || "-"}</td>
                        <td>
                            <span class="badge-mandatory">MANDATORY ITEM</span>
                            <div style="font-weight:700; color:var(--primary); font-size: 14px; margin-bottom: 4px;">${item.Nama_Barang}</div>
                            <div style="font-weight: 600; color: #666; font-size: 11px;">
                                PN: <span style="font-family:monospace; background:#f4f4f4; padding:2px 5px; border-radius:4px; color:#333;">${item.No_Part !== "UNKNOWN" ? item.No_Part : "-"}</span>
                            </div>
                            ${traceHtml}
                        </td>
                        <td>
                            <div style="margin-bottom:8px;"><span style="font-size:10px; color:#999; text-transform:uppercase;">Req. Qty</span><br/><span class="num-val">${item.Qty_Diminta}</span></div>
                            <div><span style="font-size:10px; color:#999; text-transform:uppercase;">ROB Sisa</span><br/><span class="num-val">${item.ROB}</span></div>
                        </td>
                        <td>${limitBadge}</td>
                        <td>
                            ${item.Target_Cylinder !== "-" ? `<div class="cyl-highlight"><i data-lucide="alert-triangle" style="width:11px; margin-right:4px; vertical-align:-1px;"></i> ${item.Target_Cylinder}</div>` : '<span style="color:#bbb; font-weight:500;">Safe / Below Limit</span>'}
                            <div style="font-size:9.5px; color:#888; margin-top:8px; line-height:1.4; background:#f9f9f9; padding:5px; border-radius:4px;">History:<br/>${item.RH_Terakhir}</div>
                        </td>
                        <td>
                            ${item.Warning_Text ? `<div style="color:#c0392b; font-weight:800; font-size:10.5px; margin-bottom:8px;"><i data-lucide="shield-alert" style="width:12px; margin-right:3px;"></i> ${item.Warning_Text}</div>` : ''}
                            <span class="badge ${statusClass}"><i data-lucide="${statusIcon}" style="width:12px; height:12px;"></i> ${aiStatus}</span>
                            ${aiBoxHtml}
                        </td>
                        <td style="text-align: center; vertical-align: middle;">
                            <input type="checkbox" class="v-checkbox" ${isChecked}>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            }
            lucide.createIcons();
        }

        // ==========================================
        // FUNGSI PRINT A4 PORTRAIT PERFECT FIT
        // ==========================================
        function downloadPDF() {
            const btn = document.getElementById('btnDownload');
            btn.style.display = 'none';

            // 1. Sembunyikan baris yang centangnya dicabut
            const checkboxes = document.querySelectorAll('.v-checkbox');
            const rowsToHide = [];
            checkboxes.forEach(cb => { 
                if (!cb.checked) { 
                    const tr = cb.closest('tr'); 
                    tr.style.display = 'none'; 
                    rowsToHide.push(tr); 
                } 
            });

            // 2. Manipulasi UI khusus PDF
            document.getElementById('webHeader').style.display = 'none';
            document.getElementById('printHeader').style.display = 'block';
            
            // MATIKAN SCROLL! Ini penyebab utama tabel terpotong di kiri/kanan
            const container = document.getElementById('tableContainer');
            container.style.overflow = 'visible';
            
            // Sinkronkan data judul dari Web Header ke Print Header
            document.getElementById('printTitle').innerHTML = document.getElementById('reportTitle').innerHTML;
            document.getElementById('printSubtitle').innerHTML = document.getElementById('reportSubtitle').innerHTML;

            const element = document.getElementById('printableArea');
            
            // Konfigurasi Paksa Kamera 1024px & Kertas A4 Portrait
            const opt = { 
                margin:       [0.4, 0.3, 0.4, 0.3], // Atas, Kiri, Bawah, Kanan (Inch)
                filename:     'Verification_Report.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true, windowWidth: 1024 }, // Paksa layar virtual 1024px lebar
                jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }, // Paksa Portrait
                pagebreak:    { avoid: 'tr' } // Paksa jangan gunting baris tabel
            };

            // Jalankan rendering
            html2pdf().set(opt).from(element).save().then(() => { 
                // 3. Kembalikan UI normal setelah beres download
                btn.style.display = 'flex'; 
                rowsToHide.forEach(tr => tr.style.display = ''); 
                document.getElementById('webHeader').style.display = 'flex';
                document.getElementById('printHeader').style.display = 'none';
                container.style.overflow = 'auto'; // Kembalikan scroll
            });
        }

        async function checkJobStatus(jobId) {
            try {
                let response = await fetch(`${N8N_CHECK_STATUS_URL}?job_id=${jobId}`);
                let result = await response.json();
                if (result.status === "completed" || Array.isArray(result)) {
                    let data = Array.isArray(result) ? result : result.data;
                    clearInterval(pollingInterval);
                    renderTable(data);
                }
            } catch (e) { console.log("Polling...", e); }
        }

        document.getElementById('auditForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errorBox = document.getElementById('errorBox');
            const jobId = `JOB-${Date.now()}`;

            btn.disabled = true;
            btn.innerHTML = `<div class="loader-small"></div> PROCESSING...`;
            errorBox.style.display = 'none';
            document.getElementById('reportPanel').style.display = 'none';

            const formData = new FormData();
            formData.append('engine_type', document.getElementById('engineType').value);
            formData.append('job_id', jobId);
            if (document.getElementById('rhFile').files[0]) formData.append('RH_Report', document.getElementById('rhFile').files[0]);
            formData.append('Requisition_Report', document.getElementById('reqFile').files[0]);

            try {
                const res = await fetch(N8N_UPLOAD_URL, { method: 'POST', body: formData });
                if (!res.ok) throw new Error("Connection to N8N Failed.");
                document.getElementById('pollingCard').style.display = 'block';
                pollingInterval = setInterval(() => checkJobStatus(jobId), 3000);
            } catch (err) {
                errorBox.style.display = 'block';
                errorBox.innerHTML = `<i data-lucide="alert-octagon" style="width:14px; vertical-align:-3px;"></i> Error: ${err.message}`;
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="zap"></i> RUN AI VERIFICATION`;
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
