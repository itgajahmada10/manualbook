<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Logistics Portal — Waruna Group</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        :root { --primary: #4e2b5c; --primary-hover: #3b1e47; --success: #27ae60; --bg-card: #ffffff; }
        body { margin: 0; padding: 30px 20px; background: linear-gradient(135deg, #fffdf2 0%, #ffe9d6 100%); font-family: 'Inter', sans-serif; }
        .layout-wrapper { max-width: 550px; margin: 0 auto; }
        .form-column { background: var(--bg-card); padding: 35px; border-radius: 16px; box-shadow: 0 12px 40px rgba(78, 43, 92, 0.08); border: 1px solid #e8dee8; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h2 { color: var(--primary); margin: 0; font-family: 'Poppins', sans-serif; }
        .upload-section { padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px dashed #b59ebc; }
        .upload-section.rh { background: #f4f0f5; }
        .upload-section.req { background: #fffaf0; border-color: #eeddb0; }
        .btn-submit { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; justify-content: center; gap: 10px; }
        .success-card { text-align: center; padding: 30px; border-radius: 12px; background: #f9f6fa; border: 2px solid var(--primary); display: none; }
        .btn-appsheet { display: inline-block; margin-top: 20px; padding: 12px 25px; background: var(--success); color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .loader { border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid white; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="layout-wrapper">
    <div class="form-column" id="mainFormContainer">
        <div class="header">
            <h2><i data-lucide="shield-check"></i> Requisition Audit</h2>
            <p>Engine Audit System (Background Mode)</p>
        </div>
        
        <form id="auditForm">
            <div style="margin-bottom:15px;">
                <label style="display:block; font-size:11px; font-weight:bold;">ENGINE CATEGORY</label>
                <select id="engineType" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc;">
                    <option value="ME">Main Engine (ME)</option>
                    <option value="AE">Aux Engine (AE)</option>
                </select>
            </div>

            <div class="upload-section rh">
                <label style="font-weight:bold; font-size:12px;"><i data-lucide="clock"></i> 1. RUNNING HOURS REPORT</label>
                <input type="file" id="rhFile" accept=".pdf, .xlsx, .xls">
            </div>

            <div class="upload-section req">
                <label style="font-weight:bold; font-size:12px;"><i data-lucide="file-text"></i> 2. REQUISITION / PO PDF</label>
                <input type="file" id="reqFile" accept=".pdf" required>
            </div>

            <button type="submit" id="submitBtn" class="btn-submit">START AUDIT PROCESS</button>
        </form>
    </div>

    <div id="successCard" class="success-card">
        <i data-lucide="check-circle" style="width: 50px; height: 50px; color: var(--success); margin-bottom: 15px;"></i>
        <h2 style="color: var(--primary);">Audit Berhasil Dikirim!</h2>
        <p id="successMsg"></p>
        <a id="appsheetLink" href="#" target="_blank" class="btn-appsheet">BUKA DASHBOARD APPSHEET</a>
        <button onclick="location.reload()" style="display:block; width:100%; margin-top:20px; background:none; border:none; color:var(--primary); cursor:pointer; text-decoration:underline;">Upload File Lain</button>
    </div>
</div>

<script>
    lucide.createIcons();
    const N8N_URL = "https://n8.waruna-group.co.id/webhook/277b56f1-5761-412a-9be5-86298d5aa5de";

    document.getElementById('auditForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const rhFile = document.getElementById('rhFile').files[0];
        const reqFile = document.getElementById('reqFile').files[0];

        btn.disabled = true;
        btn.innerHTML = `<div class="loader"></div> Mengirim...`;

        // KUNCI PERBAIKAN: Kirim semua dalam SATU FormData
        const formData = new FormData();
        formData.append('engine_type', document.getElementById('engineType').value);
        formData.append('job_id', `JOB-${Date.now()}`);
        if (rhFile) formData.append('RH_Report', rhFile);
        formData.append('Requisition_Report', reqFile);

        try {
            const response = await fetch(N8N_URL, { method: 'POST', body: formData });
            const result = await response.json();

            if (result.status === "processing") {
                document.getElementById('mainFormContainer').style.display = 'none';
                document.getElementById('successCard').style.display = 'block';
                document.getElementById('successMsg').innerText = result.message;
                document.getElementById('appsheetLink').href = result.appsheet_link || "#";
                lucide.createIcons();
            }
        } catch (err) {
            alert("Error: " + err.message);
            btn.disabled = false;
            btn.innerHTML = "START AUDIT PROCESS";
        }
    });
</script>
</body>
</html>
