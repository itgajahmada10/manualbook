<form id="auditForm">
                        <label>1. KATEGORI MESIN (Untuk File Excel)</label>
                        <select id="engineType">
                            <option value="ME">Main Engine (ME)</option>
                            <option value="AE">Aux Engine (AE)</option>
                        </select>

                        <label>2. MEREK MESIN SPESIFIK (Untuk Filter Qdrant)</label>
                        <input type="text" id="engineBrand" placeholder="Contoh: ME AKASAKA MITSUBISHI 6 UEC 33LS II" required>

                        <div class="upload-section">
                            <label><i data-lucide="clock"></i> 3. RUNNING HOURS REPORT</label>
                            <input type="file" id="rhFile" accept=".pdf, .xlsx, .xls">
                        </div>

                        <div class="upload-section">
                            <label><i data-lucide="file-text"></i> 4. REQUISITION / PO PDF</label>
                            <input type="file" id="reqFile" accept=".pdf" required>
                        </div>

                        <button type="submit" id="submitBtn" class="btn-submit">
                            <i data-lucide="send"></i> START AUDIT PROCESS
                        </button>
                        <div id="errorBox" style="margin-top:15px; color:red; font-size:12px; display:none; font-weight:bold;"></div>
                    </form>
